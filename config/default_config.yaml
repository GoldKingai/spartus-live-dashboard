# =============================================================================
# Spartus Live Dashboard -- User Configuration
# =============================================================================
# Edit this file to override defaults defined in live_config.py.
# Any key you omit here keeps its default value.
# Nested sections are flattened automatically (e.g. risk.max_risk_pct -> max_risk_pct).
# =============================================================================

# --- Model ------------------------------------------------------------------
# Leave empty to auto-discover the first .zip in model/ directory.
# Set explicitly only if you have multiple models and want a specific one.
# model_path: "model/spartus_champion_W170.zip"
model_path: ""

# --- MT5 --------------------------------------------------------------------
mt5_symbol: "XAUUSD"
# mt5_terminal_path: "C:/Program Files/MetaTrader 5/terminal64.exe"

# --- Symbol mapping (Dukascopy name -> your MT5 broker symbol) --------------
# Adjust if your broker uses different names (e.g. US500 -> USA500).
symbol_map:
  EURUSD: "EURUSD"
  XAGUSD: "XAGUSD"
  USDJPY: "USDJPY"
  US500:  "US500"
  USOIL:  "USOIL"

# --- Risk -------------------------------------------------------------------
risk:
  max_risk_pct: 0.02          # Max 2% of equity per trade
  max_dd: 0.10                # 10% total drawdown limit
  max_daily_dd: 0.03          # 3% daily drawdown limit
  daily_trade_soft_cap: 10    # After this many trades, conviction must exceed 0.6
  daily_trade_hard_cap: 50    # Absolute max trades per day (demo, use 20 for live)
  min_hold_bars: 6            # Minimum bars before closing (6 x M5 = 30 min)
  min_sl_atr: 1.0             # Minimum SL distance: 1.0 ATR
  min_sl_trail_atr: 0.5       # Minimum trailing SL distance: 0.5 ATR
  direction_threshold: 0.3    # |direction| must exceed this to open
  min_conviction: 0.30        # Conviction floor (raised from 0.15 based on Week 1 data)
  elevated_conviction_threshold: 0.6  # Required after daily_trade_soft_cap reached
  exit_threshold: 0.6         # Matched to training (was 0.5, caused early exits)
  allow_min_lot_override: false  # Disabled: min-lot must still pass hard risk cap

# --- Profit Protection (rule-based staged SL) --------------------------------
# Stage 1: Move SL to breakeven when trade reaches +1.0R
# Stage 2: Lock +0.5R profit when trade reaches +1.5R
# Stage 3: Activate ATR trailing stop when trade reaches +2.0R
# R = abs(entry_price - initial_stop_loss)
profit_protection:
  protection_be_trigger_r: 1.0
  protection_be_buffer_pips: 0.5
  protection_lock_trigger_r: 1.5
  protection_lock_amount_r: 0.5
  protection_trail_trigger_r: 2.0
  protection_trail_atr_mult: 1.0

# --- Circuit breakers -------------------------------------------------------
# NOTE: These are DEMO-MODE values (relaxed).
# For live trading, tighten back to:
#   consecutive_loss_pause: 5, pause_minutes: 15
#   severe_loss_pause: 8, severe_pause_minutes: 60
#   daily_dd_halt_pct: 0.05, daily_dd_close_all_pct: 0.08
#   weekly_dd_halt_pct: 0.10
circuit_breakers:
  consecutive_loss_pause: 10          # Pause after 10 consecutive losses (demo)
  consecutive_loss_pause_minutes: 5   # ... for 5 minutes (demo)
  severe_loss_pause: 15               # Hard pause after 15 consecutive losses (demo)
  severe_loss_pause_minutes: 15       # ... for 15 minutes (demo)
  daily_dd_halt_pct: 0.20             # Halt new trades at 20% daily DD (demo)
  daily_dd_close_all_pct: 0.30        # Close ALL positions at 30% daily DD (demo)
  weekly_dd_halt_pct: 0.40            # Halt for the week at 40% weekly DD (demo)

# --- Weekend ----------------------------------------------------------------
weekend:
  friday_close_utc_hour: 20           # Close all positions by 20:00 UTC Friday
  friday_block_new_utc_hour: 19       # Block new trades from 19:00 UTC Friday
  monday_resume_utc_hour: 0           # Resume trading Monday at 00:30 UTC
  monday_resume_utc_minute: 30

# --- Feature pipeline -------------------------------------------------------
features:
  warmup_bars: 500
  norm_window: 200
  norm_clip: 5.0
  frame_stack: 10

# --- Normalization mode -----------------------------------------------------
# "adaptive" = rolling 200-bar z-score (updates live -- vulnerable to crashes)
# "frozen"   = use training baseline mean/std (deterministic, immune to crashes)
# STRONGLY RECOMMENDED: "frozen" for real capital.
# The model was trained under a fixed distribution -- adaptive can distort it.
normalization_mode: "frozen"

# --- Auto-reset detector (for adaptive mode only) ---------------------------
# Triggers automatic normalizer reset if z-score distribution deviates too far.
auto_reset:
  auto_reset_z_abs_mean_threshold: 3.5    # mean(|z|) > 3.5 triggers reset
  auto_reset_pct_features_over_4sigma: 0.20  # >20% features above 4σ triggers reset
  auto_reset_cooldown_bars: 50            # Min bars between auto-resets

# --- Calendar ---------------------------------------------------------------
calendar:
  # Leave empty to auto-detect from MT5 (recommended).
  # The CalendarBridge EA writes to MT5's Common Files folder.
  calendar_bridge_path: ""
  calendar_csv_path: "data/calendar/economic_calendar.csv"
  calendar_static_path: "data/calendar/known_events.json"
  calendar_bridge_max_age_s: 7200     # Max age before stale (2 hours)

# --- Paper trading ----------------------------------------------------------
paper_trading: true

# --- Observation period (set enabled: true to activate) ---------------------
observation:
  observation_period_enabled: false
  observation_period_days: 14
  observation_lot_cap: 0.01

# --- Post-rounding risk cap (always on) ------------------------------------
post_rounding:
  enable_post_rounding_risk_cap: true
  post_rounding_risk_cap: 1.5
  absolute_risk_cap_pct: 0.10  # Raised from 0.03: allows min-lot at £100 (training has no cap)

# --- Daily reset ------------------------------------------------------------
daily_reset_utc_hour: 0

# --- Logging ----------------------------------------------------------------
logging:
  log_every_action: true
  log_observations_every_n_bars: 12
  log_feature_stats: true

# --- Analytics & drift detection --------------------------------------------
analytics:
  feature_drift_threshold_sigma: 2.0
  corr_drift_yellow_threshold: 0.15
  corr_drift_red_threshold: 0.25
  corr_drift_yellow_persist: 3
  corr_drift_red_persist: 2
  action_flat_rate_warn: 0.90
  action_std_collapse_warn: 0.10
  weekly_report_auto: true
  retrain_trigger_pf_weeks: 3

# --- Normalizer persistence -------------------------------------------------
normalizer:
  normalizer_state_path: "storage/state/normalizer_state.json"
  normalizer_backup_interval_s: 3600
  normalizer_max_age_s: 3600

# --- Broker constraints / spread gate -----------------------------------------
broker_constraints:
  spread_hard_max_points: 50        # Block entry when spread exceeds N integer points
  spread_spike_multiplier: 2.5      # Block entry when spread > EMA * multiplier
  min_sl_buffer_points: 5           # Safety buffer (points) above stops_level+spread for SL
  broker_heavy_refresh_s: 600       # Full symbol_info refresh interval (seconds)
  broker_light_refresh_s: 10        # Spread/tick refresh interval (seconds)
